<!DOCTYPE html>

<html>
<head>
    <title>Navbar</title>
    <style>
    body {
        margin:0;
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    .topnav {
        overflow: hidden;
        background-color: darkmagenta;
    }
    .topnav a {
        float: left;
        color: skyblue;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
    }
    .topnav a:hover {
        background-color: darkorchid;
        color: royalblue;
    }
    .topnav a.active {
        background-color: lavenderblush;
        color: navajowhite;
    }
    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="About us.html">About_Us</a>
        <a href="Gallery.html">Gallery</a>
        <a href="Contact us.html">Contact_Us</a>
    </div>
</body>
</html>
