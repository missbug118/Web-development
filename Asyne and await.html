<!DOCTYPE html>
<html>

<body>
<h2>JavaScript async / await</h2>
<h1 id="result"></h1>

<script>
function getSum(a, b) {
    return new Promise(function(resolve) {
        setTimeout(function() {
            resolve(a + b);
        }, 1000);
    });
}

async function add(a, b) {
    let response = await getSum(a, b);
    display(response);
}

function display(some) {
    document.getElementById("result").innerHTML = some;
}

add(5, 20);
</script>

</body>
</html>
