<!DOCTYPE html>

<html>

<head>

<title></title>

</head>
<body>
    <p> The answer of multiplying 67 with 20 is:</p>
    <button type="button" onclick="myFunction()">Answer!</button>
    <p id="demo"></p>
    <p id="demo1"></p>
    <script>
        
        var b = 67;
        function myFunction(){
            var a = 20;
       
        document.getElementById("demo").innerHTML = b * a;
        }
        document.getElementById("demo1").innerHTML = a;
        document.getElementById("demo").innerHTML = b;
    </script>
</body>
</html>
