<!DOCTYPE html>

<html>

<head>

<title></title>

</head>
<body>
    <p> Click the button to grt a time based greeting</p>
    <button onclick="myFunction()"> Tryit!</button>
    <p id="hour"></p>
    <p id="greet"></p>
    <script>
        function myFunction() {
            var greeting;
            var time = new Date().getHours();
            if(time < 10) {
                greeting="good morning";

            }
            else if (time < 20 ) {
                greeting="good day";
            }
            else {
                greeting= "good evening";
            }
            document.getElementById("hour").innerHTML = "Current hour is :" + time;
             document.getElementById("greet").innerHTML = greeting;
        }
    </script>
</body>
</html>
