 <!DOCTYPE html>
<html>

<head>
<style>
body {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#clock {
    font-size: 80px;
    color: #00ffcc;
    font-family: 'Digital-7', monospace;
    letter-spacing: 5px;
}
</style>
</head>

<body>

<div id="clock"></div>

<script>
function showTime() {
    var date = new Date();
    var h = date.getHours();
    var m = date.getMinutes();
    var s = date.getSeconds();
    var session = "AM";

    if (h >= 12) {
        session = "PM";
    }
    if (h > 12) {
        h = h - 12;
    }
    if (h == 0) {
        h = 12;
    }

    h = (h < 10) ? "0" + h : h;
    m = (m < 10) ? "0" + m : m;
    s = (s < 10) ? "0" + s : s;

    var time = h + ":" + m + ":" + s + " " + session;

    document.getElementById("clock").innerText = time;

    setTimeout(showTime, 1000);
}

showTime();
</script>

</body>

</html>
