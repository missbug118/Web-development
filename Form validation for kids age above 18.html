<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        h2 {
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
        button {
            padding: 8px 20px;
            margin-top: 10px;
        }
        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
    <script>
        function validateForm() {
            var name = document.forms["myForm"]["fname"].value;
            var age = document.forms["myForm"]["age"].value;

            if (name == "") {
                alert("Name must be filled out");
                return false;
            }

            if (age == "") {
                alert("Age must be filled out");
                return false;
            }

            if (age < 18) {
                alert("You must be 18 or older to login");
                return false;
            }

            document.getElementById("message").innerHTML = "Login Successful!";
            return false;
        }
    </script>
</head>

<body>

<h2>Login Form</h2>

<form name="myForm" onsubmit="return validateForm()">
    <input type="text" name="fname" placeholder="Enter your name"><br>
    <input type="number" name="age" placeholder="Enter your age"><br>
    <button type="submit">Login</button>
</form>

<p id="message"></p>

</body>
</html>
