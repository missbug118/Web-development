<!DOCTYPE html>

<html>

<head>

<title>Variables</title>

</head>
<body>
    <h1> JavaScript Variables</h1>
    <p>A<b>JavaScript program</b> is a list of <b>statements</b>
    to be executed by a computer.</p>
    <p id="demo"></p>
    <script>
        var x, y, z; //statement 1
        x = 9; //statement 2
         y = 7; //statement 3
          z = x + y; //statement 4
        document.getElementById("demo").innerHTML = 
        "The value of z is: " + z + ".";
    </script>
</body>
</html>
